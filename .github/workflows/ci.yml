# CI/CD Workflow для BeerTestShop
# Запускается при любом пуше и merge в main

name: CI Pipeline

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      test-pattern:
        description: 'Теги для запуска определенных тестов например: **/*ControllerTest.java, по дефолту запускаются все'
        required: false
        default: '**/*Test.java'

env:
  JAVA_VERSION: '17'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Скачивание кода из репы
      - name: Checkout code
        uses: actions/checkout@v4

      # Установка Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # Сборка проекта
      - name: Build project
        run: mvn clean package -DskipTests

      # Проверка качества кода
      - name: Code quality check (non-blocking)
        run: mvn pmd:check checkstyle:check
        continue-on-error: true
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'

      - name: Code quality check (blocking for main)
        run: mvn pmd:check checkstyle:check
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

      # Запуск тестов (все по умолчанию или выбранные)
      - name: Run unit tests
        run: mvn test -Dtest=${{ inputs.test-pattern || '**/*Test.java' }}

      # Отчёт о тестах
      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          fail_on_failure: true

      # Сохранение отчётов о тестах
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      # Сохранение отчёта PMD
      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 7

      # Сохранение отчёта Checkstyle
      - name: Upload Checkstyle report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 7
